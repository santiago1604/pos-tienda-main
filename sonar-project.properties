# =============================================================================
#  SonarQube — Configuración del proyecto StoreCell
#  Archivo: sonar-project.properties (raíz del proyecto)
# =============================================================================
#
#  Opciones de análisis:
#
#  A) SonarCloud (gratuito para repos públicos):
#     https://sonarcloud.io → Import repository → se lee este archivo.
#
#  B) SonarQube local (Docker):
#     docker run -d -p 9000:9000 sonarqube:community
#     sonar-scanner  (desde la raíz del proyecto)
#
#  C) GitHub Actions (ver .github/workflows/sonar.yml)
# =============================================================================

# ── Identificación del proyecto ──────────────────────────────────────────────
sonar.projectKey=storecell-pos
sonar.projectName=StoreCell POS
sonar.projectVersion=1.0.0
sonar.organization=storecell

# ── Código fuente ────────────────────────────────────────────────────────────
# Directorios a analizar
sonar.sources=app,routes,database/migrations,database/sql,resources/views

# Archivos a excluir del análisis
sonar.exclusions=\
  vendor/**,\
  node_modules/**,\
  public/**,\
  storage/**,\
  bootstrap/cache/**,\
  **/*.min.js,\
  **/*.min.css,\
  resources/views/emails/**

# ── Cobertura de tests ───────────────────────────────────────────────────────
# Directorio de tests
sonar.tests=tests

# Reporte de cobertura generado por PHPUnit + pcov/xdebug:
#   php artisan test --coverage-clover=coverage.xml
sonar.php.coverage.reportPaths=coverage.xml

# ── Lenguaje principal ───────────────────────────────────────────────────────
sonar.language=php

# ── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Duplicaciones ────────────────────────────────────────────────────────────
# Ignorar duplicaciones en migraciones y vistas de correo (plantillas similares)
sonar.cpd.exclusions=\
  database/migrations/**,\
  resources/views/emails/**

# ── Quality Gate sugerido para presentación ──────────────────────────────────
# Configurar en la interfaz web de SonarQube:
#   - Coverage             >= 0%   (proyecto nuevo, sin tests aún)
#   - Duplicated Lines     <= 5%
#   - Maintainability Rating = A
#   - Reliability Rating   = A
#   - Security Rating      = A
