name: Análisis SonarQube — StoreCell

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio con historial completo (requerido por Sonar)
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Instalar PHP 8.2
      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, pcov
          coverage: pcov

      # 3. Instalar dependencias Composer (sin devtools de producción)
      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 4. Preparar entorno de tests
      - name: Preparar .env de test
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=storecell/DB_DATABASE=:memory:/' .env

      # 5. Ejecutar tests y generar reporte de cobertura
      - name: Ejecutar tests con cobertura
        run: php artisan test --coverage-clover=coverage.xml
        continue-on-error: true   # No bloquear el análisis si faltan tests

      # 6. Ejecutar SonarQube Scanner
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}   # ej: https://sonarcloud.io
